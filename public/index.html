<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EB-Media Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EDE8DF;
  --surface: #F4F0E8;
  --surface2: #EDE8DF;
  --surface3: #E4DDD2;
  --border: rgba(60,45,30,0.1);
  --border2: rgba(60,45,30,0.18);
  --text: #1E1A14;
  --text2: #6B5F4E;
  --text3: #A89880;
  --gold: #B08D5B;
  --gold-bg: rgba(176,141,91,0.1);
  --gold-border: rgba(176,141,91,0.28);
  --green: #4A7C59;
  --green-bg: rgba(74,124,89,0.1);
  --green-border: rgba(74,124,89,0.28);
  --red: #9B3A2F;
  --red-bg: rgba(155,58,47,0.09);
  --red-border: rgba(155,58,47,0.25);
  --purple: #6B5B8A;
  --purple-bg: rgba(107,91,138,0.09);
  --purple-border: rgba(107,91,138,0.25);
  --teal: #3A7A7A;
  --teal-bg: rgba(58,122,122,0.09);
  --teal-border: rgba(58,122,122,0.25);
  --pink: #9B5A6A;
  --pink-bg: rgba(155,90,106,0.09);
  --pink-border: rgba(155,90,106,0.25);
  --serif: 'Cormorant Garamond', serif;
  --sans: 'DM Sans', sans-serif;
  --r: 4px; --rl: 6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;overflow:hidden}
.shell{display:flex;height:100vh}
.sidebar{width:218px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border2);display:flex;flex-direction:column}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface)}
.content{flex:1;overflow-y:auto;padding:24px 28px;background:var(--bg)}

.sb-header{padding:22px 20px 16px;border-bottom:1px solid var(--border2)}
.sb-logo{font-family:var(--serif);font-size:24px;font-weight:600;letter-spacing:1px}
.sb-logo span{color:var(--gold)}
.sb-sub{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:0.3px}
.sb-month-select{margin-top:12px}
.sb-month-select select{width:100%;background:var(--surface3);border:1px solid var(--border2);color:var(--text);border-radius:var(--r);padding:6px 10px;font-size:12px;font-family:var(--sans);cursor:pointer}
.sb-nav{padding:8px 10px;flex:1;overflow-y:auto}
.sb-group{font-size:10px;color:var(--text3);padding:12px 8px 4px;letter-spacing:1.2px;text-transform:uppercase}
.sb-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:var(--r);border:none;background:transparent;color:var(--text2);font-size:13px;font-family:var(--sans);cursor:pointer;text-align:left;transition:all 0.15s}
.sb-btn:hover{background:var(--surface3);color:var(--text)}
.sb-btn.active{background:var(--surface3);color:var(--text);font-weight:500;border-left:2px solid var(--gold);padding-left:8px}
.sb-btn .ico{width:14px;height:14px;flex-shrink:0;opacity:0.4}
.sb-btn.active .ico{opacity:0.85}
.pill{margin-left:auto;font-size:10px;color:var(--text3);background:var(--surface3);padding:1px 7px;border-radius:10px;border:1px solid var(--border)}
.sb-btn.active .pill{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-border)}
.sb-footer{padding:14px 20px;border-top:1px solid var(--border)}
.ws-status{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text3)}
.ws-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.ws-dot.live{background:var(--green)}
.ws-dot.err{background:var(--red)}

.tb-title{font-family:var(--serif);font-size:21px;font-weight:500;letter-spacing:0.3px}
.tb-right{display:flex;align-items:center;gap:10px}
.badge{font-size:11px;padding:3px 11px;border-radius:20px;border:1px solid}
.badge.gold{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-border)}
#saveStatus{font-size:11px;color:var(--text3)}
#saveStatus.saving{color:var(--green)}

.sec{display:none}.sec.active{display:block}

.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.stat-val{font-family:var(--serif);font-size:34px;font-weight:500;letter-spacing:-0.5px}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.pbar{height:1px;background:var(--border2);border-radius:1px;margin-top:12px;overflow:hidden}
.pfill{height:100%;border-radius:1px;transition:width 0.5s ease}
.pfill.gold{background:var(--gold)}.pfill.green{background:var(--green)}.pfill.purple{background:var(--purple)}

.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--gold);border-radius:var(--rl);padding:14px 18px}
.kpi-lbl{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.kpi-val{font-size:13px;color:var(--text);line-height:1.6;font-weight:300}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.card-hdr{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-hdr h3{font-family:var(--serif);font-size:16px;font-weight:500;letter-spacing:0.3px}
.card-hdr .cnt{font-size:11px;color:var(--text3)}

.task{display:flex;align-items:flex-start;gap:11px;padding:10px 18px;cursor:pointer;transition:background 0.1s;border-bottom:1px solid var(--border)}
.task:last-child{border-bottom:none}
.task:hover{background:var(--surface2)}
.task.done-row{opacity:0.4}
.chk{width:15px;height:15px;border:1px solid var(--border2);border-radius:2px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.chk.done{background:var(--green);border-color:var(--green)}
.chk.done::after{content:'';display:block;width:5px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translate(1px,-1px)}
.task-body{flex:1;min-width:0}
.task-txt{font-size:13px;line-height:1.5;color:var(--text);font-weight:300}
.task-txt.done{color:var(--text3);text-decoration:line-through}
.task-foot{display:flex;align-items:center;gap:6px;margin-top:4px}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:400;border:1px solid;letter-spacing:0.2px}
.tag-Leads{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-border)}
.tag-Pitch{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-border)}
.tag-Sales{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.tag-AI{background:var(--teal-bg);color:var(--teal);border-color:var(--teal-border)}
.tag-Tech{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-border)}
.tag-Research{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-border)}
.tag-Deal{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.tag-Ekspansion{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.tag-Team{background:var(--pink-bg);color:var(--pink);border-color:var(--pink-border)}
.tag-Demo{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-border)}
.tag-Kunde{background:var(--teal-bg);color:var(--teal);border-color:var(--teal-border)}

.cal-wrap{padding:18px}
.cal-wd-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.cal-wd{font-size:10px;color:var(--text3);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:0.8px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{border-radius:var(--r);padding:8px 7px;min-height:62px;border:1px solid var(--border);background:var(--surface)}
.cal-day.empty{background:transparent;border-color:transparent}
.cal-day.weekend{background:var(--surface2);border-color:transparent;opacity:0.5}
.cal-day .dn{font-family:var(--serif);font-size:15px;font-weight:500;margin-bottom:3px}
.cal-day .dl{font-size:9px;line-height:1.4;color:var(--text3)}
.cal-day.together{background:rgba(74,124,89,0.07);border-color:rgba(74,124,89,0.18)}
.cal-day.together .dn{color:var(--green)}.cal-day.together .dl{color:var(--green);opacity:0.7}
.cal-day.blocked{background:rgba(155,58,47,0.07);border-color:rgba(155,58,47,0.18)}
.cal-day.blocked .dn{color:var(--red)}.cal-day.blocked .dl{color:var(--red);opacity:0.7}
.cal-day.travel{background:rgba(176,141,91,0.09);border-color:rgba(176,141,91,0.22)}
.cal-day.travel .dn{color:var(--gold)}.cal-day.travel .dl{color:var(--gold);opacity:0.7}
.cal-day.vaekst{background:rgba(58,122,122,0.07);border-color:rgba(58,122,122,0.18)}
.cal-day.vaekst .dn{color:var(--teal)}.cal-day.vaekst .dl{color:var(--teal);opacity:0.7}
.cal-day.exam{background:rgba(107,91,138,0.07);border-color:rgba(107,91,138,0.18)}
.cal-day.exam .dn{color:var(--purple)}.cal-day.exam .dl{color:var(--purple);opacity:0.7}
.today-ring{float:right;width:6px;height:6px;border-radius:50%;background:var(--gold);margin-top:2px}
.cal-legend{display:flex;flex-wrap:wrap;gap:14px;padding:14px 18px;border-top:1px solid var(--border)}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.leg-dot{width:8px;height:8px;border-radius:1px;flex-shrink:0}

.deal-row{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--border)}
.deal-row:last-child{border-bottom:none}
.deal-name{font-size:13px;font-weight:300}
.deal-status{font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid;letter-spacing:0.3px}
.ds-open{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-border)}
.ds-done{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}

.hs-task{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:11px 18px;border-bottom:1px solid var(--border)}
.hs-task:last-child{border-bottom:none}
.hs-task-title{font-size:13px;font-weight:400;margin-bottom:3px}
.hs-task-meta{font-size:11px;color:var(--text3)}
.hs-badge{font-size:10px;padding:2px 9px;border-radius:20px;border:1px solid;flex-shrink:0}
.hs-open{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-border)}
.hs-done{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.hs-overdue{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}

.empty-state{padding:32px;text-align:center;color:var(--text3);font-size:13px}
.loading{padding:24px;text-align:center;color:var(--text3);font-size:12px}

.fu-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:10px;overflow:hidden}
.fu-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.fu-to{font-size:13px;font-weight:500;color:var(--text)}
.fu-meta{font-size:11px;color:var(--text3)}
.fu-subject{font-size:12px;color:var(--text2);padding:0 18px;margin-top:8px}
.fu-draft{padding:12px 18px;font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;font-family:var(--sans);font-weight:300}
.fu-draft textarea{width:100%;min-height:120px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 12px;font-size:13px;color:var(--text);font-family:var(--sans);font-weight:300;line-height:1.6;resize:vertical}
.fu-sig{padding:8px 18px;font-size:11px;color:var(--text3);background:var(--surface2);border-top:1px solid var(--border);white-space:pre-wrap;line-height:1.5}
.fu-actions{padding:10px 18px;display:flex;gap:8px;border-top:1px solid var(--border)}
.fu-btn{padding:7px 16px;border-radius:var(--r);border:1px solid;font-size:12px;font-family:var(--sans);cursor:pointer;transition:all 0.15s}
.fu-btn.send{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.fu-btn.send:hover{background:var(--green);color:#fff}
.fu-btn.edit{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-border)}
.fu-btn.edit:hover{background:var(--gold);color:#fff}
.fu-btn.ignore{background:var(--surface2);color:var(--text3);border-color:var(--border2)}
.fu-btn.ignore:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.fu-btn:disabled{opacity:0.4;cursor:not-allowed}
.fu-badge{font-size:10px;padding:2px 8px;border-radius:10px}
.fu-badge.old{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.fu-badge.med{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border)}
.fu-badge.new{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.fu-toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#fff;padding:12px 20px;border-radius:var(--rl);font-size:13px;z-index:100;opacity:0;transition:opacity 0.3s}
.fu-toast.show{opacity:1}

/* ── Add task ── */
.add-task-btn{display:flex;align-items:center;gap:6px;padding:10px 18px;font-size:12px;color:var(--text3);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:var(--sans);transition:color 0.15s}
.add-task-btn:hover{color:var(--gold)}
.add-task-form{padding:10px 18px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.add-task-form input{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;font-family:var(--sans);color:var(--text);background:var(--surface2)}
.add-task-form input:focus{outline:none;border-color:var(--gold)}
.add-task-row{display:flex;gap:6px;align-items:center}
.add-task-row select{padding:5px 8px;border:1px solid var(--border2);border-radius:var(--r);font-size:11px;font-family:var(--sans);color:var(--text2);background:var(--surface2);flex-shrink:0}
.add-task-row button{padding:5px 14px;border-radius:var(--r);border:1px solid var(--gold-border);background:var(--gold-bg);color:var(--gold);font-size:11px;font-family:var(--sans);cursor:pointer;flex-shrink:0;transition:all 0.15s}
.add-task-row button:hover{background:var(--gold);color:#fff}
.add-task-row .cancel{background:none;border-color:var(--border2);color:var(--text3)}
.add-task-row .cancel:hover{background:var(--surface3);color:var(--text2)}

/* ── Upload modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(30,26,20,0.4);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);width:380px;max-width:90vw;box-shadow:0 8px 32px rgba(30,26,20,0.15)}
.modal-hdr{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-family:var(--serif);font-size:18px;font-weight:500}
.modal-close{background:none;border:none;font-size:18px;color:var(--text3);cursor:pointer;padding:4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.modal-field select,.modal-field input[type="file"]{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;font-family:var(--sans);color:var(--text);background:var(--surface2)}
.modal-submit{width:100%;padding:10px;border-radius:var(--r);border:1px solid var(--gold-border);background:var(--gold-bg);color:var(--gold);font-size:13px;font-family:var(--sans);cursor:pointer;font-weight:500;transition:all 0.15s}
.modal-submit:hover{background:var(--gold);color:#fff}
.modal-submit:disabled{opacity:0.4;cursor:not-allowed}

/* ── To-do liste ── */
.todo-summary{display:flex;align-items:center;gap:16px;margin-bottom:16px;padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl)}
.todo-summary-val{font-family:var(--serif);font-size:28px;font-weight:500}
.todo-summary-lbl{font-size:12px;color:var(--text3)}
.todo-summary-bar{flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.todo-summary-fill{height:100%;background:var(--green);border-radius:2px;transition:width 0.4s ease}
.todo-reset{margin-left:auto;padding:5px 12px;border:1px solid var(--border2);border-radius:var(--r);background:none;color:var(--text3);font-size:11px;font-family:var(--sans);cursor:pointer}
.todo-reset:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.todo-cat{margin-bottom:12px}
.todo-cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl) var(--rl) 0 0;border-bottom:none}
.todo-cat-title{font-size:12px;font-weight:500;letter-spacing:0.5px;display:flex;align-items:center;gap:8px}
.todo-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.todo-cat-cnt{font-size:11px;color:var(--text3)}
.todo-cat-bar{height:2px;background:var(--border2);overflow:hidden}
.todo-cat-fill{height:100%;transition:width 0.4s ease}
.todo-items{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--rl) var(--rl);overflow:hidden}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;cursor:pointer;transition:background 0.1s;border-bottom:1px solid var(--border)}
.todo-item:last-child{border-bottom:none}
.todo-item:hover{background:var(--surface2)}
.todo-item.checked{opacity:0.45}
.todo-chk{width:14px;height:14px;border:1.5px solid var(--border2);border-radius:2px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.todo-chk.on{background:var(--green);border-color:var(--green)}
.todo-chk.on::after{content:'';display:block;width:5px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translate(1px,-1px)}
.todo-txt{font-size:12px;line-height:1.5;color:var(--text);font-weight:300}
.todo-txt.struck{text-decoration:line-through;color:var(--text3)}

/* ── Arkitektur diagram v2 ── */
.arch-wrap{background:#0F1117;border:1px solid rgba(255,255,255,0.06);border-radius:12px;overflow:auto;padding:28px 24px 20px}
.arch-row{display:flex;align-items:stretch;gap:0;min-width:820px}
.arch-col{display:flex;flex-direction:column;gap:10px}
.arch-col.col-1{width:188px;flex-shrink:0}
.arch-col.col-server{flex:1;min-width:320px}
.arch-col.col-ext{width:228px;flex-shrink:0}
.arch-col-hdr{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(96,165,250,0.65);font-weight:600;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(96,165,250,0.12)}
.arch-server-box{background:rgba(22,27,50,0.55);border:1px dashed rgba(255,255,255,0.09);border-radius:10px;padding:10px;flex:1;overflow:visible}
.arch-server-lbl{font-size:8px;color:rgba(255,255,255,0.22);text-transform:uppercase;letter-spacing:1.5px;text-align:center;margin-bottom:8px}
.arch-server-inner{display:grid;grid-template-columns:1fr 1fr;gap:7px;overflow:visible}
.arch-card{background:#1A1D2E;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 12px;position:relative;cursor:default;transition:transform 150ms ease,border-color 150ms ease,box-shadow 150ms ease;overflow:visible}
.arch-card:hover{transform:translateY(-2px)}
.arch-card.stable{border-color:#22C55E;box-shadow:0 0 12px rgba(34,197,94,0.13)}
.arch-card.dev{border-color:#F97316;box-shadow:0 0 12px rgba(249,115,22,0.13)}
.arch-card.issue{border-color:#EF4444;box-shadow:0 0 12px rgba(239,68,68,0.13)}
.arch-card:hover.stable{border-color:#4ADE80!important;box-shadow:0 0 20px rgba(34,197,94,0.24)!important}
.arch-card:hover.dev{border-color:#FB923C!important;box-shadow:0 0 20px rgba(249,115,22,0.24)!important}
.arch-card:hover.issue{border-color:#F87171!important;box-shadow:0 0 20px rgba(239,68,68,0.24)!important}
.arch-card-name{font-size:11px;font-weight:500;color:#E2E8F0;font-family:'Courier New',monospace;margin-bottom:3px;letter-spacing:0.2px}
.arch-card-sub{font-size:9px;color:rgba(255,255,255,0.3);line-height:1.45}
.arch-tip{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#2A2D3E;color:#f0f0f0;font-size:11px;line-height:1.55;padding:10px 13px;border-radius:8px;max-width:260px;width:max-content;border:1px solid rgba(255,255,255,0.1);box-shadow:0 4px 24px rgba(0,0,0,0.55);visibility:hidden;opacity:0;transition:opacity 150ms,visibility 150ms;z-index:300;white-space:normal;text-align:left;font-weight:300;pointer-events:none;font-family:var(--sans)}
.arch-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#2A2D3E}
.arch-card:hover .arch-tip,.arch-db-card:hover .arch-tip{visibility:visible;opacity:1}
.arch-conn{width:68px;flex-shrink:0;display:flex;flex-direction:column;justify-content:space-around;align-items:stretch;padding:30px 6px 30px}
.arch-arrow{display:flex;align-items:center;gap:0;margin-bottom:5px}
.arch-arrow-line{flex:1;height:1px;background:rgba(71,85,105,0.75);position:relative}
.arch-ah{width:0;height:0;border-top:3.5px solid transparent;border-bottom:3.5px solid transparent;border-left:5.5px solid rgba(100,116,139,0.8);flex-shrink:0}
.arch-ah.left{border-left:none;border-right:5.5px solid rgba(100,116,139,0.8)}
.arch-arrow-lbl{position:absolute;top:-12px;left:0;right:0;text-align:center;font-size:7px;color:rgba(255,255,255,0.2);white-space:nowrap;font-family:'Courier New',monospace}
@keyframes flow-r{0%{left:2px;opacity:0}20%{opacity:1}80%{opacity:1}100%{left:calc(100% - 7px);opacity:0}}
@keyframes flow-l{0%{left:calc(100% - 7px);opacity:0}20%{opacity:1}80%{opacity:1}100%{left:2px;opacity:0}}
.arch-dot{width:5px;height:5px;border-radius:50%;position:absolute;top:50%;transform:translateY(-50%);animation:flow-r 2.2s ease-in-out infinite}
.arch-dot.c-g{background:rgba(34,197,94,0.9)}
.arch-dot.c-b{background:rgba(96,165,250,0.9)}
.arch-dot.c-o{background:rgba(249,115,22,0.9)}
.arch-dot.rev{animation:flow-l 2.2s ease-in-out infinite}
.arch-db-arrow{text-align:center;font-size:14px;color:rgba(255,255,255,0.12);line-height:1;margin:3px 0 2px}
.arch-db-card{background:#1A1D2E;border:1px solid #22C55E;border-radius:10px;padding:10px 12px;position:relative;cursor:default;box-shadow:0 0 12px rgba(34,197,94,0.13);transition:transform 150ms ease,box-shadow 150ms ease;overflow:visible}
.arch-db-card:hover{transform:translateY(-2px);border-color:#4ADE80;box-shadow:0 0 20px rgba(34,197,94,0.24)}
.latency-card{background:#1A1D2E;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px 14px;margin-top:8px}
.latency-hdr{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.28);margin-bottom:10px}
.latency-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:10px}
.latency-row:last-child{margin-bottom:0;padding-top:5px;border-top:1px solid rgba(255,255,255,0.05)}
.latency-lbl{color:rgba(255,255,255,0.35)}
.latency-val{font-family:'Courier New',monospace;font-weight:600;font-size:11px}
.arch-legend{display:flex;gap:20px;padding:16px 0 4px;justify-content:center}
.arch-leg{display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(255,255,255,0.45)}
.arch-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
@media(max-width:900px){.arch-row{flex-direction:column;min-width:unset;gap:20px}.arch-conn{display:none}.arch-col.col-1,.arch-col.col-ext{width:auto}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Roadmap Snake ── */
.rm-snake-outer{max-width:700px;margin:0 auto 40px}
.rm-snake-wrap{position:relative;padding-top:197.14%}
.rm-snake-svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible}
.rm-ms-card{position:absolute;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:15px 18px;width:65%;transform:translateY(-50%);box-shadow:0 1px 4px rgba(60,45,30,0.06)}
.rm-ms-card.right{left:2%}
.rm-ms-card.left{right:2%}
.rm-ms-time{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.8px;margin-bottom:6px}
.rm-ms-title{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:8px;letter-spacing:0.2px}
.rm-ms-text{font-size:12px;color:var(--text2);line-height:1.65;font-weight:300;margin-bottom:12px}
.rm-ms-badge{display:inline-flex;align-items:center;font-size:9px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1px solid}
.rm-ms-badge.live{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.rm-ms-badge.inprog{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-border)}
.rm-ms-badge.plan{background:var(--teal-bg);color:var(--teal);border-color:var(--teal-border)}
.rm-ms-badge.plan2{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-border)}
.rm-ms-badge.goal{background:var(--pink-bg);color:var(--pink);border-color:var(--pink-border)}
/* Notes */
.rm-notes-title{font-family:var(--serif);font-size:20px;font-weight:500;color:var(--text);margin-bottom:16px;letter-spacing:0.3px}
.rm-acc{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;background:var(--surface)}
.rm-acc-hdr{display:flex;align-items:center;gap:12px;padding:12px 18px;cursor:pointer;transition:background 150ms}
.rm-acc-hdr:hover{background:var(--surface3)}
.rm-acc-ico{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;line-height:1}
.rm-acc-ico.gold{background:var(--gold-bg);border:1px solid var(--gold-border)}
.rm-acc-ico.green{background:var(--green-bg);border:1px solid var(--green-border)}
.rm-acc-ico.purple{background:var(--purple-bg);border:1px solid var(--purple-border)}
.rm-acc-ico.teal{background:var(--teal-bg);border:1px solid var(--teal-border)}
.rm-acc-ico.red{background:var(--red-bg);border:1px solid var(--red-border)}
.rm-acc-txt{flex:1;min-width:0}
.rm-acc-title{font-size:13px;font-weight:500;color:var(--text)}
.rm-acc-preview{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.rm-acc-arrow{color:var(--text3);transition:transform 300ms ease;font-size:9px;flex-shrink:0}
.rm-acc-arrow.open{transform:rotate(180deg)}
.rm-acc-body{max-height:0;overflow:hidden;transition:max-height 320ms ease}
.rm-acc-body.open{max-height:600px}
.rm-acc-inner{padding:4px 18px 16px;font-size:12.5px;color:var(--text2);line-height:1.75;font-weight:300;border-top:1px solid var(--border)}
.rm-acc-inner strong{color:var(--text);font-weight:500}
.rm-acc-inner code{font-family:monospace;font-size:11px;background:var(--surface3);padding:1px 5px;border-radius:3px;color:var(--text2)}
@media(max-width:600px){.rm-ms-card{width:72%}.rm-snake-outer{max-width:100%}}
</style>
</head>
<body>
<div class="shell">
  <div class="sidebar">
    <div class="sb-header">
      <div class="sb-logo">EB<span>.</span></div>
      <div class="sb-sub">Team Dashboard</div>
      <div class="sb-month-select">
        <select id="monthSelect" onchange="switchMonth(this.value)"></select>
      </div>
      <button class="sb-btn" onclick="showUploadMonth()" style="margin-top:8px;font-size:11px;opacity:0.7;padding:5px 10px">
        <svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3v10M3 8h10"/></svg>
        Ny måned
      </button>
    </div>
    <div class="sb-nav">
      <div class="sb-group">Navigér</div>
      <button class="sb-btn active" onclick="showSec('overview')" data-sec="overview">
        <svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        Overblik<span class="pill" id="pill-overview">0%</span>
      </button>
      <button class="sb-btn" onclick="showSec('calendar')" data-sec="calendar">
        <svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="12" rx="1.5"/><path d="M5 1v4M11 1v4M1 7h14"/></svg>
        Kalender
      </button>
      <button class="sb-btn" onclick="showSec('followups')" data-sec="followups">
        <svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h12M2 7h8M2 11h10"/><path d="M12 9l2 2-2 2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Opfølgning<span class="pill" id="pill-followups">0</span>
      </button>
      <div class="sb-group">Projekter</div>
      <div id="dynNav"></div>
      <button class="sb-btn" onclick="showSec('hubspot')" data-sec="hubspot">
        <svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5" cy="8" r="2"/><circle cx="11" cy="4" r="2"/><circle cx="11" cy="12" r="2"/><path d="M7 8h1.5M9.5 5.5l-2 2M9.5 10.5l-2-2"/></svg>
        HubSpot
      </button>
      <div class="sb-group">October AI</div>
      <button class="sb-btn" onclick="window.location.href='/financial.html'">
        <svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12l3-4 3 2 3-5 3 3"/><rect x="1" y="1" width="14" height="14" rx="1.5"/></svg>
        Finansiel Model
      </button>
      <button class="sb-btn" onclick="showSec('todo')" data-sec="todo">
        <svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8l3 3 7-7"/></svg>
        To-do<span class="pill" id="pill-todo">0%</span>
      </button>
      <button class="sb-btn" onclick="showSec('arch')" data-sec="arch">
        <svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="5" height="5" rx="1"/><rect x="10" y="1" width="5" height="5" rx="1"/><rect x="5.5" y="10" width="5" height="5" rx="1"/><path d="M3.5 6v2h9V6M8 8v2"/></svg>
        Arkitektur
      </button>
      <button class="sb-btn" onclick="showSec('roadmap')" data-sec="roadmap">
        <svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 13L6 7l3 4 3-5 2 3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="14" cy="3" r="1.5"/></svg>
        Roadmap
      </button>
    </div>
    <div class="sb-footer">
      <div class="ws-status"><div class="ws-dot" id="wsDot"></div><span id="wsText">Forbinder…</span></div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="tb-title" id="tbTitle">Overblik</div>
      <div class="tb-right">
        <span id="saveStatus"></span>
        <span class="badge gold" id="tbBadge">April 2025</span>
      </div>
    </div>
    <div class="content" id="content"><div class="loading">Henter…</div></div>
  </div>
</div>

<script>
let config=null,state={},currentMonth=null,currentSec='overview',ws=null,followups=[],emailConfigured=false;
const SIGNATURE=`\n\n--\nBest Regards\nEmil Bloch Thomsen, indehaver\nWebsite: www.eb-media.dk\nT: 22312151\nM: 31213348\nkontakt@eb-media.dk\nMarstalsgade 29, København Ø`;

async function init(){
  const months=await fetch('/api/months').then(r=>r.json());
  const sel=document.getElementById('monthSelect');
  months.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=fmtMonth(m);sel.appendChild(o);});
  currentMonth=months[0]||'2025-04';
  if(sel.options.length)sel.value=currentMonth;
  state=await fetch('/api/state').then(r=>r.json());
  await loadFollowups();
  await loadConfig(currentMonth);
  updateTodoPill();
  connectWS();
}

function fmtMonth(m){const[y,mo]=m.split('-');return new Date(y,mo-1,1).toLocaleDateString('da-DK',{month:'long',year:'numeric'});}

async function loadConfig(month){
  currentMonth=month;
  config=await fetch(`/api/config/${month}`).then(r=>r.json()).catch(()=>null);
  if(!config){document.getElementById('content').innerHTML='<div class="empty-state">Ingen konfiguration fundet</div>';return;}
  document.getElementById('tbBadge').textContent=config.title||month;
  buildDynNav();render();
}

async function switchMonth(month){state=await fetch('/api/state').then(r=>r.json());await loadConfig(month);}

function connectWS(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}`);
  const dot=document.getElementById('wsDot'),txt=document.getElementById('wsText');
  ws.onopen=()=>{dot.className='ws-dot live';txt.textContent='Live sync';};
  ws.onclose=()=>{dot.className='ws-dot err';txt.textContent='Afbrudt…';setTimeout(connectWS,3000);};
  ws.onmessage=(e)=>{
    const d=JSON.parse(e.data);
    if(d.type==='toggle'&&d.month===currentMonth){
      if(!state[d.month])state[d.month]={};
      if(!state[d.month][d.section])state[d.month][d.section]={};
      state[d.month][d.section][d.id]=d.value;
      render();flashSave('Opdateret af makker');
    }
    if(d.type==='config-update'&&d.month===currentMonth){
      loadConfig(currentMonth);
    }
    if(d.type==='followup-new'){
      followups.push(d.followup);updateFollowupPill();
      if(currentSec==='followups')render();
      flashSave('Ny opfølgning');
    }
    if(d.type==='followup-update'){
      followups=followups.filter(f=>f.id!==d.id);updateFollowupPill();
      if(currentSec==='followups')render();
    }
  };
}

async function toggle(section,id){
  const res=await fetch('/api/toggle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({month:currentMonth,section,id})});
  const d=await res.json();
  if(!state[currentMonth])state[currentMonth]={};
  if(!state[currentMonth][section])state[currentMonth][section]={};
  state[currentMonth][section][id]=d.value;
  render();flashSave('Gemt');
}

function isDone(s,id){return!!(state[currentMonth]&&state[currentMonth][s]&&state[currentMonth][s][id]);}
function flashSave(msg){const el=document.getElementById('saveStatus');el.textContent='✓ '+msg;el.className='saving';setTimeout(()=>{el.textContent='';el.className='';},2000);}

function buildDynNav(){
  if(!config)return;
  const groups={};
  Object.entries(config.sections).forEach(([k,s])=>{const g=s.group||'Andet';if(!groups[g])groups[g]=[];groups[g].push({k,s});});
  const ico='<svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="1.5"/><path d="M5 8h6M5 5h6M5 11h4"/></svg>';
  let html='';
  Object.entries(groups).forEach(([g,secs])=>{
    html+=`<div class="sb-group">${g}</div>`;
    secs.forEach(({k,s})=>{const{done,total}=pct(k);html+=`<button class="sb-btn" onclick="showSec('sec-${k}')" data-sec="sec-${k}">${ico}${s.label}<span class="pill" id="pill-${k}">${done}/${total}</span></button>`;});
  });
  document.getElementById('dynNav').innerHTML=html;
}

function showSec(key){currentSec=key;document.querySelectorAll('.sb-btn').forEach(b=>b.classList.toggle('active',b.dataset.sec===key));render();}
function pct(k){if(!config||!config.sections[k])return{done:0,total:0,p:0};const t=config.sections[k].tasks,d=t.filter(i=>isDone(k,i.id)).length;return{done:d,total:t.length,p:t.length?Math.round(d/t.length*100):0};}
function allPct(){if(!config)return{done:0,total:0,p:0};let d=0,t=0;Object.keys(config.sections).forEach(k=>{const p=pct(k);d+=p.done;t+=p.total;});return{done:d,total:t,p:t?Math.round(d/t*100):0};}
function groupPct(g){if(!config)return{done:0,total:0,p:0};let d=0,t=0;Object.entries(config.sections).forEach(([k,s])=>{if(s.group===g){const p=pct(k);d+=p.done;t+=p.total;}});return{done:d,total:t,p:t?Math.round(d/t*100):0};}

function taskHtml(sk,task){
  const done=isDone(sk,task.id);
  const tag=task.tag?`<span class="tag tag-${task.tag}">${task.tag}</span>`:'';
  return`<div class="task${done?' done-row':''}" onclick="toggle('${sk}','${task.id}')"><div class="chk${done?' done':''}"></div><div class="task-body"><div class="task-txt${done?' done':''}">${task.text}</div>${tag?`<div class="task-foot">${tag}</div>`:''}</div></div>`;
}

function calHtml(){
  if(!config||!config.calendar)return'<div class="empty-state">Ingen kalender</div>';
  const{year,month,events}=config.calendar;
  let startDow=new Date(year,month-1,1).getDay();
  startDow=startDow===0?6:startDow-1;
  const dim=new Date(year,month,0).getDate(),today=new Date();
  function cls(d){const dow=(startDow+d-1)%7;if(dow>=5)return'weekend';for(const e of events){if(e.day===d)return e.type;if(e.from&&e.from<=d&&d<=e.to)return e.type;}for(const e of events){if(e.weekday&&e.weekday===dow+1)return e.type;}return'together';}
  function lbl(d){const dow=(startDow+d-1)%7;if(dow>=5)return'';for(const e of events){if(e.day===d)return e.label;if(e.from&&e.from<=d&&d<=e.to)return e.label;}for(const e of events){if(e.weekday&&e.weekday===dow+1)return e.label;}return'Arbejder sammen';}
  let cells='';
  for(let i=0;i<startDow;i++)cells+='<div class="cal-day empty"></div>';
  for(let d=1;d<=dim;d++){const isToday=today.getFullYear()===year&&today.getMonth()===month-1&&today.getDate()===d;cells+=`<div class="cal-day ${cls(d)}">${isToday?'<div class="today-ring"></div>':''}<div class="dn">${d}</div><div class="dl">${lbl(d)}</div></div>`;}
  return`<div class="card"><div class="cal-wrap"><div class="cal-wd-row"><div class="cal-wd">Man</div><div class="cal-wd">Tirs</div><div class="cal-wd">Ons</div><div class="cal-wd">Tors</div><div class="cal-wd">Fre</div><div class="cal-wd">Lør</div><div class="cal-wd">Søn</div></div><div class="cal-grid">${cells}</div></div><div class="cal-legend"><div class="leg"><div class="leg-dot" style="background:var(--green)"></div>Arbejder sammen</div><div class="leg"><div class="leg-dot" style="background:var(--red)"></div>Kan ikke arbejde</div><div class="leg"><div class="leg-dot" style="background:var(--gold)"></div>Rejse</div><div class="leg"><div class="leg-dot" style="background:var(--teal)"></div>Vækst for Alex</div><div class="leg"><div class="leg-dot" style="background:var(--purple)"></div>Eksamen</div></div></div>`;
}

async function loadHubspot(){
  if(!config||!config.hubspot||!config.hubspot.enabled)return'<div class="empty-state">HubSpot ikke konfigureret</div>';
  try{
    const res=await fetch(`https://api.hubapi.com/crm/v3/objects/tasks?properties=hs_task_subject,hs_task_status,hs_task_type,hs_timestamp&limit=50&hapikey=${config.hubspot.apiKey}`);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const tasks=(data.results||[]).map(t=>({title:t.properties.hs_task_subject||'(Ingen titel)',status:t.properties.hs_task_status||'NOT_STARTED',type:t.properties.hs_task_type||'',ts:t.properties.hs_timestamp||''}));
    const open=tasks.filter(t=>t.status==='NOT_STARTED'||t.status==='IN_PROGRESS');
    const done=tasks.filter(t=>t.status==='COMPLETED'||t.status==='DEFERRED');
    const fd=ts=>ts?new Date(ts).toLocaleDateString('da-DK',{day:'numeric',month:'short'}):'';
    const bc=s=>s==='COMPLETED'?'hs-done':s==='DEFERRED'?'hs-overdue':'hs-open';
    const bl=s=>s==='COMPLETED'?'Udført':s==='DEFERRED'?'Udsat':s==='IN_PROGRESS'?'I gang':'Åben';
    const row=t=>`<div class="hs-task"><div><div class="hs-task-title">${t.title}</div><div class="hs-task-meta">${t.type?t.type+' · ':''}${fd(t.ts)}</div></div><span class="hs-badge ${bc(t.status)}">${bl(t.status)}</span></div>`;
    return`<div class="grid-2"><div class="card"><div class="card-hdr"><h3>Åbne opgaver</h3><span class="cnt">${open.length}</span></div>${open.length?open.map(row).join(''):'<div class="empty-state">Ingen åbne opgaver</div>'}</div><div class="card"><div class="card-hdr"><h3>Afsluttede</h3><span class="cnt">${done.length}</span></div>${done.length?done.map(row).join(''):'<div class="empty-state">Ingen</div>'}</div></div>`;
  }catch(e){return`<div class="card"><div class="empty-state">HubSpot fejl: ${e.message}</div></div>`;}
}

async function loadFollowups(){
  try{
    followups=await fetch('/api/followups').then(r=>r.json());
    const es=await fetch('/api/email-status').then(r=>r.json());
    emailConfigured=es.configured;
  }catch(e){followups=[];}
  updateFollowupPill();
}

function updateFollowupPill(){
  const el=document.getElementById('pill-followups');
  if(el)el.textContent=followups.length;
}

function ageBadge(days){
  if(days>=30)return`<span class="fu-badge old">${days} dage</span>`;
  if(days>=14)return`<span class="fu-badge med">${days} dage</span>`;
  return`<span class="fu-badge new">${days} dage</span>`;
}

function renderFollowups(){
  if(!followups.length)return'<div class="empty-state">Ingen afventende opfølgninger</div>';
  const warn=!emailConfigured?`<div style="background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:var(--rl);padding:12px 18px;margin-bottom:14px;font-size:12px;color:var(--gold)">⚠ Email-sending er ikke konfigureret. Sæt <code>GMAIL_APP_PASSWORD</code> env var på Railway for at sende direkte. Du kan stadig kopiere udkastet.</div>`:'';
  return warn+followups.map(f=>{
    const draftClean=f.draft.includes('Best Regards')?f.draft.split(/\n\n--\n/)[0]:f.draft;
    return`<div class="fu-card" id="fu-${f.id}">
      <div class="fu-header">
        <div><span class="fu-to">${f.til}</span><div class="fu-subject">Re: ${f.emne}</div></div>
        <div style="text-align:right">${ageBadge(f.dage_siden)}<div class="fu-meta" style="margin-top:4px">Sendt ${f.sendt_dato}</div></div>
      </div>
      <div class="fu-draft" id="fu-draft-${f.id}">
        <textarea id="fu-text-${f.id}" onfocus="this.style.minHeight='160px'">${draftClean}</textarea>
      </div>
      <div class="fu-sig">Signatur tilføjes automatisk:\n${SIGNATURE.trim()}</div>
      <div class="fu-actions">
        <button class="fu-btn send" onclick="sendFollowup('${f.id}')">✉ Åbn i Gmail</button>
        <button class="fu-btn edit" onclick="copyFollowup('${f.id}')">📋 Kopiér udkast</button>
        <button class="fu-btn ignore" onclick="ignoreFollowup('${f.id}')">Ignorér</button>
      </div>
    </div>`;
  }).join('');
}

function showToast(msg){
  let t=document.getElementById('fu-toast');
  if(!t){t=document.createElement('div');t.id='fu-toast';t.className='fu-toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

async function sendFollowup(id){
  const f=followups.find(x=>x.id===id);
  if(!f) return;
  const textarea=document.getElementById('fu-text-'+id);
  const draft=textarea?textarea.value:f.draft;
  const fullBody=draft+SIGNATURE;
  const subject='Re: '+f.emne;
  // Åbn Gmail compose med mailen udfyldt
  const gmailUrl=`https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(f.til)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(fullBody)}`;
  window.open(gmailUrl,'_blank');
  // Marker som sendt i databasen
  try{
    await fetch(`/api/followups/${id}`,{
      method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({status:'sendt'})
    });
    followups=followups.filter(x=>x.id!==id);
    updateFollowupPill();render();
    showToast('✓ Gmail åbnet — marker som sendt');
  }catch(e){}
}

async function copyFollowup(id){
  const textarea=document.getElementById('fu-text-'+id);
  const draft=(textarea?textarea.value:'')+SIGNATURE;
  try{await navigator.clipboard.writeText(draft);showToast('✓ Kopieret til udklipsholder');}
  catch(e){showToast('Kunne ikke kopiere');}
}

async function ignoreFollowup(id){
  await fetch(`/api/followups/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'ignoreret'})});
  followups=followups.filter(f=>f.id!==id);
  updateFollowupPill();render();
  showToast('Opfølgning ignoreret');
}

/* ════ Upload ny måned ════ */
function showUploadMonth(){
  if(document.getElementById('upload-modal'))return;
  const now=new Date();
  const nextMonth=new Date(now.getFullYear(),now.getMonth()+1,1);
  const defaultMonth=nextMonth.getFullYear()+'-'+String(nextMonth.getMonth()+1).padStart(2,'0');
  // Generer 12 måneder fremad fra nu
  let monthOpts='';
  for(let i=0;i<12;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    const val=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const lbl=d.toLocaleDateString('da-DK',{month:'long',year:'numeric'});
    monthOpts+=`<option value="${val}"${val===defaultMonth?' selected':''}>${lbl}</option>`;
  }
  const modal=document.createElement('div');
  modal.id='upload-modal';
  modal.className='modal-overlay';
  modal.onclick=(e)=>{if(e.target===modal)modal.remove();};
  modal.innerHTML=`<div class="modal"><div class="modal-hdr"><h3>Ny måned</h3><button class="modal-close" onclick="document.getElementById('upload-modal').remove()">&times;</button></div><div class="modal-body"><div class="modal-field"><label>Måned</label><select id="upload-month">${monthOpts}</select></div><div class="modal-field"><label>Upload dokument</label><input type="file" id="upload-file" accept=".pdf,.docx,.txt"></div><div id="upload-status" style="font-size:11px;color:var(--text3);margin-bottom:10px"></div><button class="modal-submit" id="upload-btn" onclick="doUploadMonth()">Upload og generer</button></div></div>`;
  document.body.appendChild(modal);
}
async function doUploadMonth(){
  const monthSel=document.getElementById('upload-month');
  const fileInput=document.getElementById('upload-file');
  const btn=document.getElementById('upload-btn');
  const status=document.getElementById('upload-status');
  if(!fileInput.files.length){status.textContent='Vælg en fil først';status.style.color='var(--red)';return;}
  btn.disabled=true;btn.textContent='Uploader…';
  const form=new FormData();
  form.append('month',monthSel.value);
  form.append('file',fileInput.files[0]);
  try{
    const res=await fetch('/api/config/upload',{method:'POST',body:form});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Upload fejlede');
    // Tilføj måned til dropdown og switch til den
    const sel=document.getElementById('monthSelect');
    const exists=[...sel.options].some(o=>o.value===monthSel.value);
    if(!exists){const o=document.createElement('option');o.value=monthSel.value;o.textContent=fmtMonth(monthSel.value);sel.insertBefore(o,sel.firstChild);}
    sel.value=monthSel.value;
    await switchMonth(monthSel.value);
    document.getElementById('upload-modal').remove();
    flashSave('Ny måned genereret');
  }catch(e){
    status.textContent='Fejl: '+e.message;status.style.color='var(--red)';
    btn.disabled=false;btn.textContent='Upload og generer';
  }
}

function getTodoState(){try{return JSON.parse(localStorage.getItem('oct-todo')||'{}');}catch(e){return {};}}
function setTodoState(s){localStorage.setItem('oct-todo',JSON.stringify(s));}
function toggleTodo(key){const s=getTodoState();s[key]=!s[key];setTodoState(s);render();updateTodoPill();}
function resetTodo(){localStorage.removeItem('oct-todo');render();updateTodoPill();}

function updateTodoPill(){
  const s=getTodoState();const total=TODO_CATS.reduce((a,c)=>a+c.items.length,0);
  const done=TODO_CATS.reduce((a,c)=>a+c.items.filter((_,i)=>s[c.name+'-'+i]).length,0);
  const el=document.getElementById('pill-todo');
  if(el)el.textContent=total?Math.round(done/total*100)+'%':'0%';
}

function renderTodo(){
  const s=getTodoState();
  const total=TODO_CATS.reduce((a,c)=>a+c.items.length,0);
  const done=TODO_CATS.reduce((a,c)=>a+c.items.filter((_,i)=>s[c.name+'-'+i]).length,0);
  const pctVal=total?Math.round(done/total*100):0;

  let html=`<div class="todo-summary"><div><div class="todo-summary-val">${done}<span style="font-size:14px;color:var(--text3);font-family:var(--sans)"> / ${total}</span></div><div class="todo-summary-lbl">opgaver færdige</div></div><div class="todo-summary-bar"><div class="todo-summary-fill" style="width:${pctVal}%"></div></div><div style="font-family:var(--serif);font-size:22px;font-weight:500">${pctVal}%</div><button class="todo-reset" onclick="resetTodo()">Reset alle</button></div>`;

  TODO_CATS.forEach(cat=>{
    const catDone=cat.items.filter((_,i)=>s[cat.name+'-'+i]).length;
    const catPct=cat.items.length?Math.round(catDone/cat.items.length*100):0;
    html+=`<div class="todo-cat"><div class="todo-cat-hdr"><div class="todo-cat-title"><div class="todo-cat-dot" style="background:${cat.color}"></div>${cat.name}</div><div class="todo-cat-cnt">${catDone}/${cat.items.length}</div></div><div class="todo-cat-bar"><div class="todo-cat-fill" style="width:${catPct}%;background:${cat.color}"></div></div><div class="todo-items">`;
    cat.items.forEach((item,i)=>{
      const key=cat.name+'-'+i;const checked=!!s[key];
      html+=`<div class="todo-item${checked?' checked':''}" onclick="toggleTodo('${key}')"><div class="todo-chk${checked?' on':''}"></div><div class="todo-txt${checked?' struck':''}">${item}</div></div>`;
    });
    html+=`</div></div>`;
  });
  updateTodoPill();
  return html;
}

    ${arrowR('text →','c-o',1.3)}
    ${arrowL('← PCM16','c-o',1.6)}
    ${arrowR('billing','c-g',2.0)}
  </div>`;

  // ── LAG 3: External + Latency ──
  const latency=`<div class="latency-card">
    <div class="latency-hdr">Typisk Latency</div>
    <div class="latency-row"><span class="latency-lbl">STT (Whisper)</span><span class="latency-val" style="color:#22C55E">~200ms</span></div>
    <div class="latency-row"><span class="latency-lbl">GPT first chunk</span><span class="latency-val" style="color:#F97316">~600ms</span></div>
    <div class="latency-row"><span class="latency-lbl">TTS first audio</span><span class="latency-val" style="color:#F97316">~200ms</span></div>
    <div class="latency-row"><span class="latency-lbl">End-to-end</span><span class="latency-val" style="color:#E2E8F0">~1.0s</span></div>
  </div>`;
  const col3=`<div class="arch-col col-ext">
    <div class="arch-col-hdr">LAG 3 — EXTERNE</div>
    ${card('Groq','Whisper STT · ~200ms','stable','Transcription-API via Groq Cloud. Sender komprimeret WAV-audio og modtager JSON-transkription. Groq\'s hardware-acceleration giver under 200ms latency.')}
    ${card('OpenAI','GPT-4o-mini · streaming','stable','LLM-inference via OpenAI API. GPT-4o-mini balancerer hastighed og kvalitet. Server-Sent Events streamer tokens direkte til TTS-pipeline.')}
    ${card('ElevenLabs','Flash v2.5 TTS · streaming','dev','Text-to-Speech via ElevenLabs streaming API. Flash v2.5 er optimeret til lav TTFB. Returnerer PCM16 audio-stream direkte.')}
    ${card('Stripe','Billing · Webhooks','stable','Betalings-infrastruktur til abonnement og overage-fakturering. Webhook-events håndterer tenant lifecycle og betalingsstatus.')}
    ${latency}
  </div>`;

  const legend=`<div class="arch-legend">
    <div class="arch-leg"><div class="arch-leg-dot" style="background:#22C55E"></div>Virker stabilt</div>
    <div class="arch-leg"><div class="arch-leg-dot" style="background:#F97316"></div>Under udvikling</div>
    <div class="arch-leg"><div class="arch-leg-dot" style="background:#EF4444"></div>Known issues</div>
  </div>`;

  return`<div class="arch-wrap">
    <div class="arch-row">${col1}${conn12}${col2}${conn23}${col3}</div>
    ${legend}
  </div>`;
}

function getRmChecks(){try{return JSON.parse(localStorage.getItem('rm-checks')||'{}');}catch(e){return{};}}
function toggleRmItem(id){const c=getRmChecks();c[id]=!c[id];localStorage.setItem('rm-checks',JSON.stringify(c));document.getElementById('content').innerHTML=renderRoadmap();}
function toggleRmAcc(id){
  const body=document.getElementById('rm-body-'+id),arrow=document.getElementById('rm-arrow-'+id);
  if(!body)return;
  const open=body.classList.toggle('open');
  if(arrow)arrow.classList.toggle('open',open);
}

function renderRoadmap(){
  // SVG canvas: 700 wide, 1380 tall
  const W=700, H=1380, xR=530, xL=170, xC=350, R=30;

  const ms=[
    {y:220, x:xR, side:'right', c:'#4A7C59',
     time:'Nu · Live',     title:'Proof of Concept',
     text:'Voice agent på Park Lane Hotel. Iframe-integration uden SDK. Første samtaler og bookings i gang.',
     badge:'live', btxt:'● LIVE'},
    {y:480, x:xL, side:'left',  c:'#B08D5B',
     time:'Q2 2026',       title:'Første betalende kunder',
     text:'10 betalende kunder via LinkedIn og affiliate outreach til Matterport brokers. Affiliate system og client portal live. Bevis at modellen virker kommercielt.',
     badge:'inprog', btxt:'● I GANG'},
    {y:740, x:xR, side:'right', c:'#3A7A7A',
     time:'Q2–Q3 2026',    title:'Matterport Partnership',
     text:'Kontakt partnerships@matterport.com med bevist data — samtaler, konverteringer, kunder. Forhandl revenue share og SDK-adgang. Potentiel marketplace listing mod 600.000 brugere.',
     badge:'plan', btxt:'● PLANLAGT'},
    {y:1000,x:xL, side:'left',  c:'#6B5B8A',
     time:'Q3 2026',       title:'Nordisk Skalering',
     text:'50+ kunder. Officiel SDK-integration der giver dybere Matterport-kontrol. White-label til brokers. Ekspansion til Sverige, Norge og UK.',
     badge:'plan2', btxt:'● PLANLAGT'},
    {y:1260,x:xR, side:'right', c:'#9B5A6A',
     time:'Q4 2026',       title:'Profitabilitet & Vækst',
     text:'100+ kunder. Meta ads skaleres baseret på bevist CAC. Revenue share aftale aktiv med Matterport. Case studies og testimonials fra tidlige kunder. Nordisk markedsleder.',
     badge:'goal', btxt:'● MÅL'},
  ];

  // Snake path: start at top center, curve to each milestone
  const path=[
    `M ${xC},0`,
    `C ${xC},110 ${xR},130 ${xR},${ms[0].y}`,   // → M1 right
    `C ${xR},310 ${xL},370 ${xL},${ms[1].y}`,   // M1 → M2 left
    `C ${xL},590 ${xR},650 ${xR},${ms[2].y}`,   // M2 → M3 right
    `C ${xR},830 ${xL},890 ${xL},${ms[3].y}`,   // M3 → M4 left
    `C ${xL},1110 ${xR},1170 ${xR},${ms[4].y}`, // M4 → M5 right
    `C ${xR},1330 ${xC},${H} ${xC},${H}`,       // M5 → end
  ].join(' ');

  let svg=`<svg class="rm-snake-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  svg+=`<defs><filter id="rshadow"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="rgba(60,45,30,0.12)"/></filter></defs>`;
  // Road: dark edge, then fill
  svg+=`<path d="${path}" stroke="rgba(60,45,30,0.07)" stroke-width="96" fill="none" stroke-linecap="round"/>`;
  svg+=`<path d="${path}" stroke="#E8E4DC" stroke-width="88" fill="none" stroke-linecap="round" filter="url(#rshadow)"/>`;
  // Dashed centre line
  svg+=`<path d="${path}" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" fill="none" stroke-dasharray="10 7" stroke-linecap="round"/>`;

  ms.forEach((m,i)=>{
    // Glow rings
    svg+=`<circle cx="${m.x}" cy="${m.y}" r="${R+16}" fill="${m.c}" opacity="0.1"/>`;
    svg+=`<circle cx="${m.x}" cy="${m.y}" r="${R+7}" fill="${m.c}" opacity="0.18"/>`;
    // Circle
    svg+=`<circle cx="${m.x}" cy="${m.y}" r="${R}" fill="${m.c}"/>`;
    // Number
    svg+=`<text x="${m.x}" y="${m.y+5}" text-anchor="middle" fill="white" font-size="15" font-weight="700" font-family="DM Sans,sans-serif">${i+1}</text>`;
    // Short dashed connector from circle to card edge
    const cx1=m.side==='right'?m.x-R-2:m.x+R+2;
    const cx2=m.side==='right'?W*0.655:W*0.345;
    svg+=`<line x1="${cx1}" y1="${m.y}" x2="${cx2}" y2="${m.y}" stroke="${m.c}" stroke-width="1.5" opacity="0.35" stroke-dasharray="4 3"/>`;
  });
  svg+=`</svg>`;

  // Absolutely positioned content cards (% coords match SVG viewBox ratio)
  let cards='';
  ms.forEach(m=>{
    const topPct=((m.y/H)*100).toFixed(2);
    cards+=`<div class="rm-ms-card ${m.side}" style="top:${topPct}%">
      <div class="rm-ms-time" style="color:${m.c}">${m.time}</div>
      <div class="rm-ms-title">${m.title}</div>
      <div class="rm-ms-text">${m.text}</div>
      <span class="rm-ms-badge ${m.badge}">${m.btxt}</span>
    </div>`;
  });

  // Strategic notes accordion
  function acc(id,title,ico,cls,preview,html){
    return`<div class="rm-acc"><div class="rm-acc-hdr" onclick="toggleRmAcc('${id}')"><div class="rm-acc-ico ${cls}">${ico}</div><div class="rm-acc-txt"><div class="rm-acc-title">${title}</div><div class="rm-acc-preview">${preview}</div></div><span class="rm-acc-arrow" id="rm-arrow-${id}">▼</span></div><div class="rm-acc-body" id="rm-body-${id}"><div class="rm-acc-inner">${html}</div></div></div>`;
  }
  const notes=`<div>
    <div class="rm-notes-title">Strategiske overvejelser</div>
    ${acc('gtm','Go-to-market: Affiliate model','🤝','gold',
      'Broker sender ét link — vi håndterer alt. 25% recurring passivt.',
      `Primær kanal er Matterport brokers som affiliates. Brokeren sender ét link til deres hotelkunde — vi håndterer alt: betaling, support, onboarding.<br>
      Brokeren tjener <strong>25% recurring kommission</strong> passivt.<br><br>
      En broker med 20 hotelkunder på Growth-pakken tjener <strong>~$1.495/md</strong> uden aktiv indsats.<br><br>
      <strong>Nøgle-risici:</strong><br>
      · Broker mister interesse og stopper med at sende refs<br>
      · Hotel skifter broker — vi mister kunden<br><br>
      <strong>Løsning:</strong> Hotellet er vores direkte kunde. Brokeren mister kun kommission, ikke kunden.`
    )}
    ${acc('sdk','Matterport SDK og licensing','🗺️','green',
      'Iframe-integration kræver ingen SDK-licens. Kontakt partnerships fra en position af styrke.',
      `Nuværende integration bruger offentlig iframe embed og sweepId URL-parameter. Kræver <strong>ingen SDK-licens</strong>.<br>
      SDK ville give programmatisk kamera-styring og overlays — men er ikke nødvendigt for v1.<br><br>
      <strong>Strategi:</strong> Byg proof of concept uden SDK. Når vi har betalende kunder og data, kontakt <code>partnerships@matterport.com</code> fra en position af styrke.<br><br>
      Matterport kræver revenue share for kommerciel SDK-brug — typisk <strong>10–20% af omsætning</strong>.<br>
      <strong>Upside:</strong> Matterport marketplace listing og eksponering mod ~600.000 brugere.`
    )}
    ${acc('konkurrence','Konkurrencesituation','🎯','purple',
      'Ingen konkurrent navigerer i Matterport. Moat = integrationen, ikke teknologien.',
      `Generiske voice agent platforme (ElevenLabs Agents, Bland AI, Synthflow, Retell) kan ikke navigere i Matterport, har ingen room mappings og ingen booking-flow integration.<br><br>
      <strong>Vores moat er ikke teknologien men integrationen</strong> — vi er den eneste voice agent der lever inde i en Matterport tour og handler i den.<br><br>
      <strong>Primær risiko:</strong> Matterport bygger det selv. De har platformen, distributionen og SDK-nøglerne.<br>
      <strong>Mitigation:</strong> Kom til markedet hurtigt og byg broker-relationer inden Matterport eventuelt lancerer konkurrerende produkt.`
    )}
    ${acc('scaling','API skalering og concurrent limits','⚡','teal',
      'Creator: 5 streams → ~10 kunder. BYOK løser enterprise. Ikke et problem nu.',
      `<strong>ElevenLabs Flash v2.5 concurrent streams:</strong><br>
      · Creator (nu): 5 streams — dækker til ~10 kunder<br>
      · Pro $99: 10 streams — dækker til ~50 kunder<br>
      · Scale $330: 20 streams — dækker til ~200 kunder<br>
      · Enterprise $800: 50 streams — dækker til ~500 kunder<br><br>
      Minutlimits per pakke beskytter mod spike-traffic.<br>
      BYOK (bring your own key) løser problemet for enterprise brokers — de skalerer selv.<br>
      <strong>Ikke et problem ved nuværende stadie.</strong>`
    )}
    ${acc('ue','Økonomi og unit economics','📊','gold',
      'Margin ~97% · LTV:CAC 52x · Breakeven ved 3–4 kunder.',
      `Cost per voice minut: <strong>$0.011</strong> (GPT + Groq + ElevenLabs)<br>
      Salgspris Starter: 1.000 kr / 300 min = 3.33 kr/min<br>
      Margin på basisabonnement: <strong>~97%</strong><br>
      Margin på overage: <strong>~97%</strong><br>
      Variable margin efter affiliate: <strong>~72–87%</strong><br><br>
      Breakeven ved <strong>~3–4 kunder</strong> (dækker infra $40/md).<br>
      LTV ved 5% churn og $130 avg MRR: <strong>~$2.600</strong><br>
      LTV:CAC ved $50 CAC: <strong>52x</strong>`
    )}
    ${acc('juridisk','Juridisk og compliance','⚖️','red',
      'Privatlivspolitik, DPA, TOS og GDPR inden første betalende kunde.',
      `<strong>Prioritet inden første betalende kunde:</strong><br>
      · Privatlivspolitik på plads<br>
      · Databehandleraftale template til brokers<br>
      · Terms of service<br>
      · GDPR: gæste-data kan slettes på forespørgsel<br>
      · Stripe Tax for automatisk moms-håndtering<br>
      · VAT: DKK kunder opkræves dansk moms, EU B2B: reverse charge, USA: ingen moms<br><br>
      Matterport licensing: afklar inden SDK-brug, brug iframe indtil da.`
    )}
  </div>`;

  return`<div class="rm-snake-outer"><div class="rm-snake-wrap">${svg}${cards}</div></div>${notes}`;
}
